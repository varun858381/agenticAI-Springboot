spring:
  application:
    name: agentic-ai-service
  
  # ── Debug Mode ──────────────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: true
  datasource:
    url: jdbc:
    username:
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Spring AI ───────────────────────────────────────────────────────────────
  ai:
    openai:
      api-key:
      chat:
        options:
          model:
          temperature:
          max-tokens: 

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always

# ── Swagger / OpenAPI ───────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
  show-actuator: true

# ── Logging ─────────────────────────────────────────────────────────────────
debug: true
logging:
  level:
    root: DEBUG
    com.agentic.ai: DEBUG
    org.springframework: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.boot: DEBUG
    org.flywaydb: DEBUG
    org.hibernate: DEBUG

---
# ── Test profile (H2 in-memory) ─────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test-key
